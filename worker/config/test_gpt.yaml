models:
  trials:
    - "openrouter/google/gemini-2.5-flash"
    # 競合
    - "openrouter/openai/gpt-5-mini"

  judges:
    - "openrouter/openai/gpt-5-mini"

baseline_model: "openrouter/google/gemini-2.5-flash"

execution:
  seed: 42
  n_parallel: 5
  match_batch_size: 5

selection:
  strategy: "baseline_star_adaptive"
  baseline_weight: 0.5
  prefer_close_ratings: true
  avoid_recent_duplicates: true
  recent_window: 20

rating:
  backend: "elo"
  elo:
    k_initial: 32
    k_default: 16
    k_stable: 10
    draw_value: 0.5

stopping:
  max_matches: 100
  min_star_per_model: 3
