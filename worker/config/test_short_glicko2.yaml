models:
  trials:
    - "openrouter/google/gemini-2.5-flash"
    - "openrouter/google/gemini-2.5-flash-lite-preview-09-2025"
    - "openrouter/openai/gpt-5-nano"

  judges:
    - "openrouter/openai/gpt-5-nano"

baseline_model: "openrouter/google/gemini-2.5-flash"

execution:
  seed: 42
  n_parallel: 5
  match_batch_size: 5

selection:
  strategy: "glicko2"
  baseline_weight: 0.5
  avoid_recent_duplicates: true
  recent_window: 20

rating:
  backend: "glicko2"
  glicko2:
    initial_mu: 1500
    initial_phi: 350
    initial_sigma: 0.06
    tau: 0.5
    epsilon: 1e-6

stopping:
  max_matches: 30
  min_star_per_model: 3
