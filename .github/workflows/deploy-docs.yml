name: Deploy Docs + Demo to GitHub Pages

on:
  push:
    branches: [main, feature/docs]
    paths:
      - 'docs/**'
      - 'web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      # --- Docs (VitePress) ---
      - name: Build docs
        run: npm run docs:build

      # --- Demo (Next.js static export) ---
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build demo (static export)
        working-directory: web
        run: pnpm run build:demo:export
        env:
          NEXT_PUBLIC_GA_ID: G-JFGLREW28D

      # --- Merge into single artifact ---
      - name: Merge docs + demo
        run: |
          mkdir -p _site
          cp -r docs/.vitepress/dist/* _site/
          cp -r web/out _site/demo
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
